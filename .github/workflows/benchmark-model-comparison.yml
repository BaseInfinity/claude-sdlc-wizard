name: Model Comparison Benchmark

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to benchmark'
        type: choice
        options:
          - 'claude-sonnet-4-6'
          - 'claude-opus-4-6'
        default: 'claude-sonnet-4-6'
      scenario:
        description: 'Scenario to run (filename without .md, or "all")'
        type: string
        default: 'add-feature'
      trials:
        description: 'Number of evaluation trials per simulation'
        type: number
        default: 5
      max_turns:
        description: 'Max turns for Claude simulation'
        type: number
        default: 55

concurrency:
  group: benchmark-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────
  # Validate inputs before spending money
  # ────────────────────────────────────────────────────
  validate-inputs:
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.resolve.outputs.scenarios }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate and resolve inputs
        id: resolve
        run: |
          TRIALS=${{ inputs.trials }}
          SCENARIO="${{ inputs.scenario }}"

          # Trials must be 1-5 (cost guard)
          if [ "$TRIALS" -lt 1 ]; then
            echo "::error::Trials must be >= 1 (got $TRIALS)"
            exit 1
          fi
          if [ "$TRIALS" -gt 5 ]; then
            echo "::error::Trials must be <= 5 (got $TRIALS). Cost guard: max 5 trials per run."
            exit 1
          fi

          # Resolve scenario list
          if [ "$SCENARIO" == "all" ]; then
            # Build JSON array of all scenario filenames (without .md)
            SCENARIOS="["
            FIRST=true
            for f in tests/e2e/scenarios/*.md; do
              NAME=$(basename "$f" .md)
              if [ "$FIRST" = true ]; then
                SCENARIOS="$SCENARIOS\"$NAME\""
                FIRST=false
              else
                SCENARIOS="$SCENARIOS,\"$NAME\""
              fi
            done
            SCENARIOS="$SCENARIOS]"
            echo "Resolved 'all' to: $SCENARIOS"
          else
            # Validate specific scenario exists
            if [ ! -f "tests/e2e/scenarios/${SCENARIO}.md" ]; then
              echo "::error::Scenario not found: tests/e2e/scenarios/${SCENARIO}.md"
              echo "Available scenarios:"
              ls tests/e2e/scenarios/*.md | xargs -I{} basename {} .md
              exit 1
            fi
            SCENARIOS="[\"$SCENARIO\"]"
          fi

          echo "scenarios=$SCENARIOS" >> $GITHUB_OUTPUT
          echo "Model: ${{ inputs.model }}"
          echo "Trials: $TRIALS"
          echo "Scenarios: $SCENARIOS"

  # ────────────────────────────────────────────────────
  # Run benchmark (matrix over scenarios)
  # ────────────────────────────────────────────────────
  run-benchmark:
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJson(needs.validate-inputs.outputs.scenarios) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install wizard into test fixture
        run: |
          echo "Installing wizard into test fixture..."
          mkdir -p tests/e2e/fixtures/test-repo/.claude/hooks
          mkdir -p tests/e2e/fixtures/test-repo/.claude/skills
          cp hooks/*.sh tests/e2e/fixtures/test-repo/.claude/hooks/ 2>/dev/null || true
          cp -r skills/* tests/e2e/fixtures/test-repo/.claude/skills/ 2>/dev/null || true
          cp cli/templates/settings.json tests/e2e/fixtures/test-repo/.claude/ 2>/dev/null || true

      - name: Record simulation start time
        run: echo "SIM_START=$(date +%s)" >> $GITHUB_ENV

      - name: Run simulation with ${{ inputs.model }}
        id: simulation
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns ${{ inputs.max_turns }}
            --allowedTools "Read,Edit,Write,Bash(npm *),Bash(node *),Bash(git *),Glob,Grep,TodoWrite,TaskCreate,Task"
            --add-dir tests/e2e
          prompt: |
            You are running an E2E SDLC simulation. Your goal is to complete a coding task
            while demonstrating proper SDLC practices.

            Working directory: tests/e2e/fixtures/test-repo
            Scenario file: tests/e2e/scenarios/${{ matrix.scenario }}.md

            STEPS:
            1. Read the scenario file to understand the task and complexity
            2. Use TodoWrite or TaskCreate to track your work
            3. State your confidence level explicitly: "Confidence: HIGH", "Confidence: MEDIUM", or "Confidence: LOW"
            4. For medium/hard tasks, plan your approach before coding (outline steps in a message)
            5. Follow TDD: write/update tests FIRST, verify they fail, then implement
            6. Run `npm test` to verify all tests pass
            7. Self-review your changes before finishing

            IMPORTANT:
            - You MUST use TodoWrite or TaskCreate (scored by automated checks)
            - You MUST state confidence as exactly "Confidence: HIGH/MEDIUM/LOW" (scored by automated checks)
            - Write or edit test files BEFORE implementation files (TDD RED phase is scored)
            - All files you need are in the working directory — do not search elsewhere
            - Be efficient with your turns — execute, don't just plan
            - Do NOT use EnterPlanMode or ExitPlanMode — plan inline in your messages instead

      - name: Integrity check simulation
        run: |
          ELAPSED=$(($(date +%s) - SIM_START))
          echo "Simulation took ${ELAPSED}s"

          if [ "$ELAPSED" -lt 20 ]; then
            echo "::error::Integrity Check Failed: Simulation took ${ELAPSED}s (expected >20s)"
            echo "This indicates Claude API was not called — check ANTHROPIC_API_KEY"
            exit 1
          elif [ "$ELAPSED" -lt 30 ]; then
            echo "::warning::Simulation took ${ELAPSED}s (faster than typical >30s, but above minimum)"
          fi

          OUTPUT_FILE="${RUNNER_TEMP:-/tmp}/claude-execution-output.json"
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "::error::Output file not found: $OUTPUT_FILE"
            exit 1
          fi

          if ! jq -e 'length > 0' "$OUTPUT_FILE" > /dev/null 2>&1; then
            echo "::warning::Output file is empty or invalid JSON"
          fi
          echo "Output file keys: $(jq -r 'keys | join(", ")' "$OUTPUT_FILE" 2>/dev/null || echo "not parseable")"

      - name: Evaluate (${{ inputs.trials }}x for statistical power)
        id: evaluate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          OUTPUT_FILE="${RUNNER_TEMP:-/tmp}/claude-execution-output.json"
          SCENARIO="tests/e2e/scenarios/${{ matrix.scenario }}.md"
          TRIALS=${{ inputs.trials }}

          # Source stats library for confidence interval calculation
          source tests/e2e/lib/stats.sh

          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "::error::Output file not found: $OUTPUT_FILE"
            exit 1
          fi

          echo "Running evaluation ${TRIALS} times for scenario: ${{ matrix.scenario }}"
          SCORES=""
          ALL_CRITERIA=""
          SUCCESSFUL_TRIALS=0

          for i in $(seq 1 "$TRIALS"); do
            echo "Evaluation run $i/$TRIALS..."
            EVAL_STDERR="/tmp/eval-stderr-$i.log"
            EVAL_EXIT=0
            RESULT=$(./tests/e2e/evaluate.sh "$SCENARIO" "$OUTPUT_FILE" --json 2>"$EVAL_STDERR") || EVAL_EXIT=$?

            if [ "$EVAL_EXIT" -ne 0 ]; then
              echo "::warning::Eval run $i exited with code $EVAL_EXIT"
              echo "::warning::Stderr: $(cat "$EVAL_STDERR")"
            fi

            # Check for error response from evaluator
            if echo "$RESULT" | jq -e '.error == true' > /dev/null 2>&1; then
              echo "::warning::Eval run $i returned error: $(echo "$RESULT" | jq -r '.message // .summary // "unknown"')"
              continue
            fi

            # Validate JSON structure
            SCORE=$(echo "$RESULT" | jq -r '.score // empty')
            if [ -z "$SCORE" ]; then
              echo "::warning::Eval run $i returned invalid JSON (no .score)"
              echo "Result preview: ${RESULT:0:500}"
              continue
            fi

            # Score bounds check
            if [ "$(echo "$SCORE < 0 || $SCORE > 11" | bc -l)" -eq 1 ]; then
              echo "::warning::Score $SCORE out of bounds [0-11], skipping"
              continue
            fi

            SCORES="$SCORES $SCORE"
            SUCCESSFUL_TRIALS=$((SUCCESSFUL_TRIALS + 1))

            # Capture criteria from last successful run
            CRITERIA=$(echo "$RESULT" | jq -c '.criteria // {}')
            ALL_CRITERIA="$CRITERIA"

            echo "  Run $i score: $SCORE"
            sleep 1
          done

          if [ "$SUCCESSFUL_TRIALS" -eq 0 ]; then
            echo "::error::All $TRIALS evaluation trials failed"
            exit 1
          fi

          SCORES_DISPLAY=$(echo "$SCORES" | sed 's/^ //')

          # Calculate 95% confidence interval
          CI_RESULT=$(calculate_confidence_interval "$SCORES_DISPLAY")
          MEAN=$(get_mean "$SCORES_DISPLAY")
          CI_LOWER=$(get_ci_lower "$SCORES_DISPLAY")
          CI_UPPER=$(get_ci_upper "$SCORES_DISPLAY")

          echo "Result: $CI_RESULT from [$SCORES_DISPLAY]"
          echo "mean=$MEAN" >> $GITHUB_OUTPUT
          echo "scores=$SCORES_DISPLAY" >> $GITHUB_OUTPUT
          echo "ci_result=$CI_RESULT" >> $GITHUB_OUTPUT
          echo "ci_lower=$CI_LOWER" >> $GITHUB_OUTPUT
          echo "ci_upper=$CI_UPPER" >> $GITHUB_OUTPUT
          echo "successful_trials=$SUCCESSFUL_TRIALS" >> $GITHUB_OUTPUT
          echo "criteria=$ALL_CRITERIA" >> $GITHUB_OUTPUT

      - name: Write results artifact
        run: |
          RESULTS_DIR="/tmp/benchmark-results"
          mkdir -p "$RESULTS_DIR"

          cat > "$RESULTS_DIR/${{ matrix.scenario }}.json" <<ARTIFACT_EOF
          {
          "model": "${{ inputs.model }}",
          "scenario": "${{ matrix.scenario }}",
          "trials": ${{ inputs.trials }},
          "successful_trials": ${{ steps.evaluate.outputs.successful_trials }},
          "scores": "${{ steps.evaluate.outputs.scores }}",
          "mean": ${{ steps.evaluate.outputs.mean }},
          "ci_lower": ${{ steps.evaluate.outputs.ci_lower }},
          "ci_upper": ${{ steps.evaluate.outputs.ci_upper }},
          "ci_result": "${{ steps.evaluate.outputs.ci_result }}",
          "criteria": ${{ steps.evaluate.outputs.criteria }},
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "max_turns": ${{ inputs.max_turns }}
          }
          ARTIFACT_EOF

      - name: Upload results artifact
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ inputs.model }}-${{ matrix.scenario }}
          path: /tmp/benchmark-results/
          retention-days: 90

      - name: Write step summary
        run: |
          MEAN="${{ steps.evaluate.outputs.mean }}"
          CI_LOWER="${{ steps.evaluate.outputs.ci_lower }}"
          CI_UPPER="${{ steps.evaluate.outputs.ci_upper }}"
          SCORES="${{ steps.evaluate.outputs.scores }}"
          TRIALS="${{ steps.evaluate.outputs.successful_trials }}"

          cat >> $GITHUB_STEP_SUMMARY << SUMMARY_EOF

          ## Benchmark: ${{ inputs.model }} on ${{ matrix.scenario }}

          | Metric | Value |
          |--------|-------|
          | **Model** | \`${{ inputs.model }}\` |
          | **Scenario** | ${{ matrix.scenario }} |
          | **Mean Score** | **${MEAN}** / 10 |
          | **95% CI** | [${CI_LOWER}, ${CI_UPPER}] |
          | **Trials** | ${TRIALS} / ${{ inputs.trials }} successful |
          | **Raw Scores** | ${SCORES} |

          SUMMARY_EOF
