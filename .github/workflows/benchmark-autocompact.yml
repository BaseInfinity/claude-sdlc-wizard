name: Autocompact Benchmark
# Manual-trigger benchmark for testing different CLAUDE_AUTOCOMPACT_PCT_OVERRIDE
# thresholds. See AUTOCOMPACT_BENCHMARK.md for methodology.

on:
  workflow_dispatch:
    inputs:
      thresholds:
        description: 'Comma-separated thresholds (e.g., 60,75,95)'
        required: true
        default: '60,75,95'
      task:
        description: 'Task complexity: short, medium, long'
        required: true
        default: 'medium'
        type: choice
        options:
          - short
          - medium
          - long
      # Note: For multiple trials per threshold, dispatch the workflow
      # multiple times. Each dispatch = 1 trial per threshold.
      # The local harness (run-benchmark.sh) handles multi-trial natively.

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        threshold: ${{ fromJSON(format('[{0}]', inputs.thresholds)) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run benchmark trial
        uses: anthropics/claude-code-action@v1
        id: benchmark
        with:
          prompt: |
            Read the task file at tests/benchmarks/tasks/${{ inputs.task }}-task.md and execute it.
            Follow the SDLC workflow: plan, TDD, self-review.
          claude_args: "--max-turns 55"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # NOTE: Verify env var forwarding mechanism against current action.yml
          # before running. CLAUDE_AUTOCOMPACT_PCT_OVERRIDE must reach the
          # Claude process — step-level env: may or may not be forwarded by
          # the action. Check: https://github.com/anthropics/claude-code-action
        env:
          CLAUDE_AUTOCOMPACT_PCT_OVERRIDE: ${{ matrix.threshold }}

      - name: Record results
        run: |
          echo "Threshold: ${{ matrix.threshold }}"
          echo "Task: ${{ inputs.task }}"
          echo "Trials: 1 (per dispatch)"
          echo "Session completed"
          # Results extraction from $RUNNER_TEMP/claude-execution-output.json
          # Format verification needed before production use

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.threshold }}-${{ inputs.task }}
          path: |
            ${{ runner.temp }}/claude-execution-output.json
          retention-days: 30
