name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@test.local"
          git config --global user.name "CI Test"

      - name: Validate YAML workflows
        run: |
          echo "Validating workflow YAML files..."
          for file in .github/workflows/*.yml; do
            echo "Checking $file"
            python3 -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
          done
          echo "All workflow files are valid YAML"

      - name: Check for unsafe variable interpolation in workflows
        run: |
          echo "Checking for shell script issues in workflows..."
          # Extract and check run blocks from workflows
          # This is a basic check - shellcheck would be better but requires install
          for file in .github/workflows/*.yml; do
            echo "Scanning $file for common issues..."
            # Check for unsafe variable interpolation (the bug we fixed)
            if grep -E "='\\$\\{\\{.*\\}\\}'" "$file"; then
              echo "WARNING: Found potentially unsafe variable interpolation in $file"
              echo "Use env: block + file writes instead"
              exit 1
            fi
          done
          echo "No obvious shell issues found"

      - name: Validate prompt files exist
        run: |
          echo "Checking required prompt files..."
          test -f .github/prompts/analyze-release.md || (echo "Missing analyze-release.md" && exit 1)
          test -f .github/prompts/analyze-community.md || (echo "Missing analyze-community.md" && exit 1)
          echo "All prompt files present"

      - name: Validate state files
        run: |
          echo "Checking state files..."
          test -f .github/last-checked-version.txt || (echo "Missing last-checked-version.txt" && exit 1)
          test -f .github/last-community-scan.txt || (echo "Missing last-community-scan.txt" && exit 1)
          echo "All state files present"

      - name: Run version logic tests
        run: ./tests/test-version-logic.sh

      - name: Run analysis schema tests
        run: ./tests/test-analysis-schema.sh

      - name: Run workflow trigger tests
        run: ./tests/test-workflow-triggers.sh

      - name: Run deterministic pre-check tests
        run: ./tests/e2e/test-deterministic-checks.sh

      - name: Run scenario rotation tests
        run: ./tests/e2e/test-scenario-rotation.sh

      - name: Run simulation prompt tests
        run: ./tests/e2e/test-simulation-prompt.sh

      - name: Run score analytics tests
        run: ./tests/test-score-analytics.sh

      - name: Validate E2E fixtures and scenarios
        run: ./tests/e2e/run-simulation.sh

      - name: Run pairwise comparison tests
        run: ./tests/e2e/test-pairwise-compare.sh

      - name: Run CUSUM drift detection tests
        run: ./tests/test-cusum.sh

      - name: Run JSON extraction tests
        run: ./tests/e2e/test-json-extraction.sh

      - name: Run eval validation tests
        run: ./tests/e2e/test-eval-validation.sh

      - name: Run prove-it tests
        run: ./tests/test-prove-it.sh

      - name: Run hooks tests
        run: ./tests/test-hooks.sh

      - name: Run compliance tests
        run: ./tests/test-compliance.sh

      - name: Run evaluate bug fix tests
        run: ./tests/test-evaluate-bugs.sh

      - name: Run SDP calculation tests
        run: ./tests/test-sdp-calculation.sh

      - name: Run stats library tests
        run: ./tests/test-stats.sh

      - name: Run multi-call eval tests
        run: ./tests/e2e/test-multi-call-eval.sh

      - name: Run eval prompt regression tests
        run: ./tests/e2e/test-eval-prompt-regression.sh

      - name: Run external benchmark tests
        run: ./tests/test-external-benchmark.sh

      - name: Run self-update mechanism tests
        run: ./tests/test-self-update.sh

      - name: Run CLI distribution tests
        run: ./tests/test-cli.sh

      - name: Run setup-path E2E tests
        run: ./tests/test-setup-path.sh

      - name: Run docs usability tests
        run: ./tests/test-docs-usability.sh

      - name: Run plugin format tests
        run: ./tests/test-plugin.sh

      - name: Run install script tests
        run: ./tests/test-install-script.sh

      - name: Run release workflow tests
        run: ./tests/test-release-workflow.sh

      - name: Run domain detection tests
        run: ./tests/test-domain-detection.sh

      - name: Run autocompact benchmark tests
        run: ./tests/test-autocompact-benchmark.sh

      - name: Run node24 compliance tests
        run: ./tests/test-node24-compliance.sh

      - name: Run effectiveness scoreboard tests
        run: ./tests/test-effectiveness-scoreboard.sh

      - name: Run firmware fixture tests
        run: ./tests/test-firmware-fixture.sh

      - name: Run model comparison benchmark tests
        run: ./tests/test-model-comparison.sh

      - name: Run degradation detection tests
        run: ./tests/test-degradation-detection.sh

      - name: Run doc consistency tests
        run: ./tests/test-doc-consistency.sh

      - name: Run API feature detection tests
        run: ./tests/test-api-feature-detection.sh

      - name: Run Memory Audit Protocol tests
        run: ./tests/test-memory-audit-protocol.sh

      - name: Run community paths tests
        run: ./tests/test-community-paths.sh

      - name: Run persist score history tests
        run: ./tests/test-persist-score-history.sh

      - name: Run local shepherd tests
        run: ./tests/test-local-shepherd.sh

      - name: Run repo complexity tests (#233)
        run: ./tests/test-repo-complexity.sh

      - name: Run prompt-hook-fires-once tests (#224)
        run: ./tests/test-prompt-hook-fires-once.sh

      - name: Run community scanner tests (#207)
        run: ./tests/test-community-scanner.sh

      - name: Run update-skill Step 7.7 hoist tests (v1.39.1)
        run: ./tests/test-update-skill-step-7-7.sh

      - name: Run update-skill CLI version tests (#232)
        run: ./tests/test-update-skill-cli-version.sh

      - name: Run cleanup-period guidance tests (#225)
        run: ./tests/test-cleanup-period-guidance.sh

      - name: Run postmortem lessons tests (#221)
        run: ./tests/test-postmortem-lessons.sh

      - name: Run MCP-tool hook audit tests (#218)
        run: ./tests/test-mcp-hook-audit.sh

      - name: Run AGENTS.md interop tests (#205)
        run: ./tests/test-agents-md-interop.sh

  # Clean up old bot comments on PR push (keeps PRs tidy)
  # Also runs on workflow_dispatch (no-op) so branch protection doesn't block auto-merge.
  cleanup-old-comments:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: (github.event_name == 'pull_request' && github.event.action != 'labeled') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Resolve outdated bot comments
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Hide (collapse) old bot comments when new push arrives
          # Human comments are preserved
          # Replaces int128/hide-comment-action (no node24 release)
          COMMENTS=$(gh api graphql -f query='
            query($owner: String!, $name: String!, $number: Int!) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  comments(last: 100, orderBy: {field: UPDATED_AT, direction: DESC}) {
                    nodes { id author { login } body isMinimized }
                  }
                }
              }
            }' -f owner="${GITHUB_REPOSITORY_OWNER}" \
               -f name="${GITHUB_REPOSITORY#*/}" \
               -F number="$PR_NUMBER")

          echo "$COMMENTS" | jq -r '
            .data.repository.pullRequest.comments.nodes[]
            | select(.isMinimized == false)
            | select(.author.login == "github-actions[bot]")
            | select(
                (.body | startswith("## E2E SDLC Evaluation")) or
                (.body | startswith("## E2E Before/After Comparison")) or
                (.body | startswith("## E2E Quick Check")) or
                (.body | startswith("## E2E Full Evaluation")) or
                (.body | startswith("## PR Code Review")) or
                (.body | startswith("**Claude finished"))
              )
            | .id' | while read -r NODE_ID; do
              if [ -n "$NODE_ID" ]; then
                echo "Minimizing comment $NODE_ID"
                gh api graphql -f query='
                  mutation($id: ID!) {
                    minimizeComment(input: {classifier: OUTDATED, subjectId: $id}) {
                      clientMutationId
                    }
                  }' -f id="$NODE_ID"
              fi
            done
